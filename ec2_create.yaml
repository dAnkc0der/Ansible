---
- hosts: localhost
  connection: local

  tasks:
  - name: Create EC2 instances
    amazon.aws.ec2_instance:
      name: "{{ item.name }}"
      key_name: "Key-Pair-2"
      instance_type: t3.micro
      security_group: default
      region: us-east-1
      aws_access_key: "{{ec2_access_key}}"  # From vault as defined
      aws_secret_key: "{{ec2_secret_key}}"  # From vault as defined      
      network:
        assign_public_ip: true
      image_id: "{{ item.image }}"

    loop:
      - { image: "ami-00e801948462f718a", name: "ansible-instance-1" }
      - { image: "ami-091138d0f0d41ff90", name: "ansible-instance-2" }
      - { image: "ami-091138d0f0d41ff90", name: "ansible-instance-3" }